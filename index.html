<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxsus S anoq  Kalkulyator | 2 va 10-lik</title>
    <style>
        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #1e1e2e;
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #a6e3a1; margin-bottom: 25px; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .label-yellow { color: #f9e2af; }
        .label-purple { color: #cba6f7; }
        
        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #313244;
            color: white;
            border: 1px solid #45475a;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        button:hover { background-color: #b4befe; }
        button:disabled { background-color: #585b70; cursor: not-allowed; }
        
        #terminal {
            margin-top: 20px;
            background-color: #11111b;
            color: #a6e3a1;
            padding: 15px;
            border-radius: 5px;
            min-height: 200px;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            overflow-y: auto;
            max-height: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ PRO KALKULYATOR</h2>

    <label class="label-yellow">📥 Kiritish rejimi (Input):</label>
    <select id="kiritish">
        <option value="auto">Avtomatik (Auto)</option>
        <option value="2">2-lik (Ikkilik)</option>
        <option value="10">10-lik (O'nlik)</option>
    </select>

    <label class="label-purple">📤 Natija formati (O'tkazish):</label>
    <select id="chiqarish">
        <option value="auto">O'z holatida saqlash</option>
        <option value="2">2-likka o'tkazish</option>
        <option value="10">10-likka o'tkazish</option>
    </select>

    <label>1-sonni kiriting (Masalan: 1010 yoki 25):</label>
    <input type="text" id="son1" placeholder="1-son...">

    <label>Amalni tanlang:</label>
    <select id="amal">
        <option value="+">Qo'shish (+)</option>
        <option value="-">Ayirish (-)</option>
        <option value="*">Ko'paytirish (*)</option>
    </select>

    <label>2-sonni kiriting:</label>
    <input type="text" id="son2" placeholder="2-son...">

    <button id="calcBtn" onclick="hisoblash()">HISOBLASH</button>

    <div id="terminal"></div>
</div>

<script>
    let timerId = null;

    // 0b belgisiz, toza ikkilik son formatlash
    function formatBinary(val) {
        if (val < 0) return "-" + Math.abs(val).toString(2);
        return val.toString(2);
    }

    function parseSon(sonStr, forceBase) {
        sonStr = sonStr.trim().toLowerCase();
        let isNegative = sonStr.startsWith("-");
        let cleanStr = sonStr.replace("-", "");
        
        let base = 10;
        let val = 0;

        if (forceBase === 2) {
            base = 2;
            val = parseInt(cleanStr.replace("0b", ""), 2);
        } else if (forceBase === 10) {
            base = 10;
            val = parseInt(cleanStr, 10);
        } else {
            // Auto
            if (cleanStr.startsWith("0b")) {
                base = 2;
                val = parseInt(cleanStr.replace("0b", ""), 2);
            } else {
                base = 10;
                val = parseInt(cleanStr, 10);
            }
        }
        
        if (isNaN(val)) throw new Error("Invalid");
        if (isNegative) val = -val;
        
        return { val, base };
    }

    function hisoblash() {
        let s1 = document.getElementById("son1").value;
        let s2 = document.getElementById("son2").value;
        let amal = document.getElementById("amal").value;
        let inMode = document.getElementById("kiritish").value;
        let outMode = document.getElementById("chiqarish").value;
        let btn = document.getElementById("calcBtn");
        let term = document.getElementById("terminal");

        if (!s1 || !s2) {
            alert("Iltimos, ikkala sonni ham kiriting!");
            return;
        }

        try {
            let forceIn = inMode === "auto" ? null : parseInt(inMode);
            let obj1 = parseSon(s1, forceIn);
            let obj2 = parseSon(s2, forceIn);

            let outBase = obj1.base === obj2.base ? obj1.base : 10;
            if (outMode !== "auto") outBase = parseInt(outMode);

            let natija = 0;
            let amalText = "";
            if (amal === "+") { natija = obj1.val + obj2.val; amalText = "Qo'shish (+)"; }
            if (amal === "-") { natija = obj1.val - obj2.val; amalText = "Ayirish (-)"; }
            if (amal === "*") { natija = obj1.val * obj2.val; amalText = "Ko'paytirish (*)"; }

            let v1Conv = outBase === 2 ? formatBinary(obj1.val) : obj1.val.toString();
            let v2Conv = outBase === 2 ? formatBinary(obj2.val) : obj2.val.toString();
            let finalRes = outBase === 2 ? formatBinary(natija) : natija.toString();

            let k_matn = inMode === "auto" ? "Avtomatik" : `Qat'iy ${inMode}-lik`;

            let fullText = 
"----------------------------------------\n" +
"[*] TIZIM: Hisoblash va Konvertatsiya\n" +
" > Kiritish rejimi : " + k_matn + "\n" +
" > Chiqarish rejimi: " + outBase + "-lik\n" +
"----------------------------------------\n" +
" [Konvertatsiya]\n" +
" > 1-son: " + s1 + "  -->  " + v1Conv + "\n" +
" > 2-son: " + s2 + "  -->  " + v2Conv + "\n" +
" > Amal : " + amalText + "\n" +
"----------------------------------------\n" +
" [YAKUNIY NATIJA] = " + finalRes + "\n" +
"----------------------------------------\n";

            if (timerId) clearTimeout(timerId);
            term.textContent = "";
            btn.disabled = true;

            let i = 0;
            function typeWriter() {
                if (i < fullText.length) {
                    term.textContent += fullText.charAt(i);
                    term.scrollTop = term.scrollHeight;
                    i++;
                    timerId = setTimeout(typeWriter, 15);
                } else {
                    btn.disabled = false;
                }
            }
            typeWriter();

        } catch (e) {
            alert("Xatolik! Noto'g'ri qiymat kiritdingiz.");
        }
    }
</script>

</body>
</html>
